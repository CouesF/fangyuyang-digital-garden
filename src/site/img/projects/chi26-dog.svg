<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="4" fill="#f0f4ff"/>
  <!-- Dog body -->
  <ellipse cx="60" cy="72" rx="28" ry="18" fill="#8aabdd"/>
  <!-- Dog head -->
  <circle cx="60" cy="46" r="16" fill="#8aabdd"/>
  <!-- Ears -->
  <ellipse cx="48" cy="36" rx="7" ry="10" fill="#6b8fc4" transform="rotate(-15 48 36)"/>
  <ellipse cx="72" cy="36" rx="7" ry="10" fill="#6b8fc4" transform="rotate(15 72 36)"/>
  <!-- Eyes -->
  <circle cx="54" cy="44" r="2.5" fill="#fff"/>
  <circle cx="66" cy="44" r="2.5" fill="#fff"/>
  <circle cx="54.8" cy="44.8" r="1.2" fill="#333"/>
  <circle cx="66.8" cy="44.8" r="1.2" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="60" cy="52" rx="3" ry="2" fill="#333"/>
  <!-- Legs -->
  <rect x="38" y="84" width="8" height="18" rx="4" fill="#6b8fc4"/>
  <rect x="50" y="84" width="8" height="18" rx="4" fill="#6b8fc4"/>
  <rect x="62" y="84" width="8" height="18" rx="4" fill="#6b8fc4"/>
  <rect x="74" y="84" width="8" height="18" rx="4" fill="#6b8fc4"/>
  <!-- Tail -->
  <path d="M88 70 Q105 55 100 45" stroke="#6b8fc4" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- CHI badge -->
  <rect x="6" y="6" width="32" height="14" rx="3" fill="#4a6fa5"/>
  <text x="22" y="16.5" font-family="sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">CHI'26</text>
</svg>
